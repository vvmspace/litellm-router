version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: litellm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  litellm-router:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-router
    ports:
      - "${PORT:-7070}:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: [ "--config", "/app/config.yaml", "--port", "8000" ]
    depends_on:
      - redis
    restart: always

volumes:
  redis-data: